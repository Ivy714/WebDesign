<!DOCTYPE html>
<html>
<title>table exercise</title>
<style>
    table {
        border-collapse: collapse;
        width: 100%;
        max-width: 500px;
    }

    table,
    th,
    td {
        border: 1px solid black;
    }

    th,
    td {
        padding: 5px;
        text-align: left;
    }
</style>
</head>

<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Student ID</th>
        </tr>
        <tr>
            <td>Your name</td>
            <td>Your student ID</td>
        </tr>
    </table>
</body>
</html>
