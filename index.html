<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的數位名片</title>
    <style>
        /*美化網頁 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: block;
            background: #764ba2;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #667eea;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="profile-pic">🚀</div>

        <h1>Ivy</h1>
        <p>👋 哈囉！我是網頁程式設計的學生，目前是資管系二年級。</p>

        <div class="links">
            <a href="https://github.com/Ivy714" target="_blank">我的 GitHub 專案</a>
        </div>
    </div>

</body>

</html>
