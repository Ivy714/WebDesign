<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程師與設計師協作範例 - 全網頁滾動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 全網頁設定 */
        body {
            font-family: 'Roboto', "Microsoft JhengHei", sans-serif;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            margin: 0;
        }

        /* 主容器 */
        .card-container {
            width: 496px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
            margin-bottom: 50px;
            /* 底部留白，方便滾動檢視 */
        }

        /* 圖片預覽區塊 */
        .image-preview {
            width: 450px;
            height: 240px;
            background-color: #ffa500;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 控制列 */
        .control-bar {
            height: 35px;
            background-color: #f6f6f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-top: 1px solid #eaeaea;
            border-bottom: 1px solid #eaeaea;
        }

        .label-text {
            font-size: 13px;
            color: #707070;
        }

        /* 按鈕規格 (h22/R8) */
        .info-btn {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-size: 13px;
            padding: 0 10px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .info-btn:hover {
            background-color: #f0f0f0;
        }

        /* 詳細資訊區塊 - 移除固定高度與捲軸 */
        .details-section {
            display: none;
            /* 初始隱藏 */
            padding: 15px 20px;
            background-color: #ffffff;
        }

        /* 綠色長條樣式 (對應圖中綠色 Slice 區塊) */
        .green-bar {
            background-color: #85ff85;
            /* 亮綠色背景 */
            height: 20px;
            line-height: 20px;
            margin-bottom: 4px;
            /* 長條間距 */
            padding-left: 10px;
            font-size: 12px;
            color: #2f2f2f;
            border-left: 5px solid #28a745;
            /* 左側深綠色點綴線 */
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 滑動特效 (選配) */
        .green-bar:hover {
            filter: brightness(0.95);
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="image-preview">
            <img src="https://picsum.photos/450/240" alt="Preview Image">
        </div>

        <div class="control-bar">
            <span class="label-text">預覽畫面範圍</span>
            <button class="info-btn" id="toggleBtn">展開資訊</button>
        </div>

        <div class="details-section" id="details">
            <div class="green-bar">修改日期：2017/10/12</div>
            <div class="green-bar">類型：JPG</div>
            <div class="green-bar">大小：456.97 KB</div>
            <div class="green-bar">路徑：\\designcenter.qnap.com.tw\DesignCenter\PM_RD...</div>
            <div class="green-bar">解析度：1920 x 1080</div>
            <div class="green-bar">檔案名稱：20171012_1.jpg</div>
            <div class="green-bar">檔案名稱：20171012_2.jpg</div>
            <div class="green-bar">檔案名稱：20171012_3.png</div>
            <div class="green-bar">檔案名稱：20171012_4.jpg</div>
            <div class="green-bar">檔案名稱：20171012_5.jpg</div>
            <div class="green-bar">檔案名稱：20171012_6.png</div>
            <div class="green-bar">檔案名稱：20171012_7.png</div>
            <div class="green-bar">檔案名稱：20171012_8.png</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const details = document.getElementById('details');
        let isOpen = false;

        btn.addEventListener('click', () => {
            isOpen = !isOpen;

            if (isOpen) {
                details.style.display = 'block';
                btn.textContent = '收起資訊';
            } else {
                details.style.display = 'none';
                btn.textContent = '展開資訊';
            }
        });
    </script>

</body>

</html>
