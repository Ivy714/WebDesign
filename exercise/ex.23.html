<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程師與設計師協作範例</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', "Microsoft JhengHei", sans-serif;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        /* 主容器 */
        .card-container {
            width: 496px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }

        /* 圖片預覽區塊 */
        .image-preview {
            width: 450px;
            height: 240px;
            background-color: #ffa500;
            /* 示意底色 */
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 控制列 */
        .control-bar {
            height: 35px;
            background-color: #f6f6f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-top: 1px solid #eaeaea;
            border-bottom: 1px solid #eaeaea;
        }

        .label-text {
            font-size: 13px;
            color: #707070;
        }

        /* 關鍵：設計稿指定的按鈕規格 (h22/R8) */
        .info-btn {
            height: 22px;
            /* 指定高度 */
            border-radius: 8px;
            /* 指定圓角 */
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            /* 指定邊框線條 */
            color: #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            /* 指定字型大小 */
            padding: 0 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            outline: none;
        }

        .info-btn:hover {
            background-color: #f0f0f0;
        }

        /* 詳情資訊區塊 (預設隱藏) */
        .details-section {
            display: none;
            /* 初始隱藏 */
            height: 150px;
            /* 固定高度以觸發滾動條 */
            overflow-y: scroll;
            /* 強制顯示滾動條 */
            background-color: #ffffff;
        }

        /* 列表樣式 */
        .info-item {
            height: 30px;
            line-height: 30px;
            padding: 0 20px;
            font-size: 13px;
            color: #2f2f2f;
            border-bottom: 1px solid #eaeaea;
            display: flex;
        }

        .info-item:nth-child(even) {
            background-color: #fcfcfc;
        }

        .label {
            color: #0084ff;
            /* 模擬紅線標註中的藍色數據文字 */
            margin-left: 10px;
        }

        /* 自定義滾動條樣式 (對應設計稿右側提示) */
        .details-section::-webkit-scrollbar {
            width: 6px;
        }

        .details-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="image-preview">
            <img src="https://picsum.photos/450/240" alt="Preview Image">
        </div>

        <div class="control-bar">
            <span class="label-text">預覽</span>
            <button class="info-btn" id="toggleBtn">查看資訊</button>
        </div>

        <div class="details-section" id="details">
            <div class="info-item">修改日期：<span class="label">2017/10/12</span></div>
            <div class="info-item">類型：<span class="label">JPG</span></div>
            <div class="info-item">大小：<span class="label">456.97 KB</span></div>
            <div class="info-item">路徑：<span class="label">\\designcenter.qnap.com.tw\DesignCenter\PM...</span></div>
            <div class="info-item">尺寸：<span class="label">1920 x 1080</span></div>
            <div class="info-item">擁有者：<span class="label">Admin</span></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const details = document.getElementById('details');
        let isOpen = false;

        btn.addEventListener('click', () => {
            isOpen = !isOpen;

            if (isOpen) {
                details.style.display = 'block';
                btn.textContent = '收起資訊';
            } else {
                details.style.display = 'none';
                btn.textContent = '查看資訊';
            }
        });
    </script>

</body>

</html>
