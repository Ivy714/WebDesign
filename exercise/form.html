<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>表單練習</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"] {
            display: block;
            width: 250px;
            padding: 5px;
            margin-top: 5px;
        }

        .btn-group {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <form>
        <div class="form-group">
            First name:<br>
            <input type="text" name="fname" value="Your first name">
        </div>

        <div class="form-group">
            Last name:<br>
            <input type="text" name="lname" value="Your last name">
        </div>

        <div class="form-group">
            Student ID:<br>
            <input type="text" name="sid" value="Your student ID">
        </div>

        <div class="btn-group">
            <input type="submit" value="Submit">
            <input type="reset" value="重設">
        </div>
    </form>

</body>

</html>
