<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>標題樣式練習</title>
    <style>
        body {
            padding: 50px;
            font-family: "Times New Roman", Times, serif;
        }

        .container {
            border: 1px solid #ccc;
            padding: 30px;
            width: 600px;
            margin: 0 auto;
        }

        h1 {
           text-decoration: overline; 
            text-shadow:2px 2px #ffdae0;
            display: inline-block;
            padding: 5px 10px;
            margin-bottom: 30px;
        }

        h2 {
            border: 1px solid black;
            outline-color: yellow;
            outline-style: solid;
            font-style: italic;
            font-weight: normal;
            padding: 10px;
            margin-bottom: 40px;
        }

        h3 {
            text-align: right;
            text-decoration: underline;
            font-size: 1.5em;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>This is heading 1</h1>

        <h2>This is heading 2</h2>

        <h3>This is heading 3</h3>
    </div>

</body>

</html>
