<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Practice</title>
    <style>
        body {
            background-color: #5bb2ff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .main-card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* 區塊共通樣式 */
        .box {
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* 頂部綠色區塊 */
        .header-box {
            background-color: #add65c;
            height: 120px;
            width: 100%;
        }

        /* 中間藍色區塊容器 */
        .middle-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .teal-box {
            background-color: #00bcd4;
            height: 80px;
        }

        /* 底部灰色區塊容器 */
        .footer-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .gray-box {
            background-color: #e9ecef;
            height: 40px;
        }

        @media (max-width: 480px) {
            .middle-container {
                grid-template-columns: 1fr;
                /* 變成一欄直排 */
            }

            .footer-container {
                grid-template-columns: repeat(2, 1fr);
                /* 變成兩欄 (會自動換行成 2x2) */
            }
        }
    </style>
</head>

<body>

    <div class="main-card">
        <div class="box header-box"></div>

        <div class="middle-container">
            <div class="box teal-box"></div>
            <div class="box teal-box"></div>
            <div class="box teal-box"></div>
        </div>

        <div class="footer-container">
            <div class="box gray-box"></div>
            <div class="box gray-box"></div>
            <div class="box gray-box"></div>
            <div class="box gray-box"></div>
        </div>
    </div>

</body>

</html>
