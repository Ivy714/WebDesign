<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>specified button</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', "Microsoft JhengHei", sans-serif;
            background-color: #d1d1d1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .viewport-container {
            width: 500px;
            height: 450px;
            
            background-color: #fff;
            border: 1px solid #bbb;
            overflow-y: scroll;
            
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #f6f6f6;
            border-bottom: 1px solid #eaeaea;
        }

        .preview-label {
            font-size: 13px;
            color: #707070;
            font-weight: bold;
        }

        /* 按鈕 */
        .info-btn {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-size: 13px;
            padding: 0 12px;
            cursor: pointer;
            outline: none;
        }

        .info-btn:hover {
            background-color: #eee;
        }

        /* 內容 */
        .content-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-box {
            width: 450px;
            height: 240px;
            background-color: #eee;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 綠色資訊條 */
        .details-area {
            display: none;
            /* 點擊後開啟 */
            width: 450px;
        }

        .green-bar {
            background-color: #85ff85;
            /* 綠色背景 */
            height: 24px;
            line-height: 24px;
            margin-bottom: 5px;
            padding-left: 10px;
            font-size: 12px;
            color: #222;
            border-left: 6px solid #28a745;
            /* 深綠色側邊 */
            box-sizing: border-box;
        }

        .viewport-container::-webkit-scrollbar {
            width: 8px;
        }

        .viewport-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .viewport-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .viewport-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <div class="viewport-container">
        <div class="top-header">
            <div class="preview-label">預覽</div>
            <button class="info-btn" id="toggleBtn">展開資訊</button>
        </div>

        <div class="content-body">
            <div class="image-box">
                <img src="https://picsum.photos/450/240?random=1" alt="Main Image">
            </div>

            <div class="details-area" id="details">
                <div class="green-bar">修改日期：2017/10/12</div>
                <div class="green-bar">檔案類型：JPG Image</div>
                <div class="green-bar">檔案大小：456.97 KB</div>
                <div class="green-bar">檔案路徑：\\Server\Volume_1\Project\Design...</div>
                <div class="green-bar">解析度：1920 x 1080 px</div>
                <div class="green-bar">色彩模式：RGB</div>
                <div class="green-bar">20171012_資料備份_01.jpg</div>
                <div class="green-bar">20171012_資料備份_02.jpg</div>
                <div class="green-bar">20171012_資料備份_03.jpg</div>
                <div class="green-bar">20171012_資料備份_04.jpg</div>
                <div class="green-bar">20171012_資料備份_05.jpg</div>
                <div class="green-bar">20171012_資料備份_06.jpg</div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const details = document.getElementById('details');
        let isOpen = false;

        btn.addEventListener('click', () => {
            isOpen = !isOpen;
            if (isOpen) {
                details.style.display = 'block';
                btn.textContent = '收起資訊';
            } else {
                details.style.display = 'none';
                btn.textContent = '展開資訊';
            }
        });
    </script>

</body>

</html>
